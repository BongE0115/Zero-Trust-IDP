# MongoDB Deployment and Service for Forensic Sandbox
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-temp
  namespace: forensic-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-temp
  template:
    metadata:
      labels:
        app: mongodb-temp
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0 
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-temp
  namespace: forensic-sandbox
spec:
  selector:
    app: mongodb-temp
  ports:
  - port: 27017
    targetPort: 27017