# 1. Istio에게 "저 멀리 외부에 AWS RDS가 있다"고 알려주는 ServiceEntry
apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: aws-rds-external
  namespace: forensic-sandbox
spec:
  hosts:
  - "${AWS_RDS_HOST}" # AWS RDS 엔드포인트
  ports:
  - number: 3306
    name: tcp-mysql
    protocol: TCP
  location: MESH_EXTERNAL
  resolution: DNS

---
# 2. 샌드박스 앱이 AWS RDS로 나가는 것을 '무조건 거부(DENY)'하는 AuthorizationPolicy
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-aws-rds-egress
  namespace: forensic-sandbox
spec:
  selector:
    matchLabels:
      app: forensic-sandbox-app # 샌드박스 컨슈머 파드만 타겟팅
  action: DENY # ★ 차단!
  rules:
  - to:
    - operation:
        hosts: ["${AWS_RDS_HOST}"]
        ports: ["3306"]