apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: 'https://github.com/BongE0115/Zero-Trust-IDP.git'
    targetRevision: jy
    path: gitops/platform/observability/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true