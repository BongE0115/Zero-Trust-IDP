apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-cluster-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: 'https://github.com/BongE0115/Zero-Trust-IDP.git'
    targetRevision: jy # 브랜치에 따라 수정하면 됨. 
    path: gitops/apps/kafka-cluster/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true