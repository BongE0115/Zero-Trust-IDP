apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: bitnami/kafka:3.7 # 최신 안정 버전 권장
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_CFG_ZOOKEEPER_CONNECT
          value: zookeeper:2181
        - name: ALLOW_PLAINTEXT_LISTENER
          value: "yes"
        - name: KAFKA_CFG_LISTENERS
          value: PLAINTEXT://:9092
        - name: KAFKA_CFG_ADVERTISED_LISTENERS
          value: PLAINTEXT://kafka:9092
        # 백엔드에 맞춘 자동 토픽 생성 설정
        - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        # 시작 시 특정 토픽을 미리 만들고 싶다면 (선택 사항)
        - name: KAFKA_CREATE_TOPICS
          value: "aiops-topic:3:1" # 토픽명:파티션:복제본
---
apiVersion: v1
kind: Service
metadata:
  name: kafka # 백엔드 ENV의 'kafka:9092'와 일치됨
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
