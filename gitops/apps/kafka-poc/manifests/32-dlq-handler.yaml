apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlq-handler
  namespace: kafka-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlq-handler
  template:
    metadata:
      labels:
        app: dlq-handler
    spec:
      serviceAccountName: dlq-handler-sa
      containers:
        - name: dlq-handler
          image: ghcr.io/bonge0115/dlq-handler:latest
          imagePullPolicy: Always
          env:
            - name: KAFKA_BOOTSTRAP
              value: kafka.kafka-poc.svc.cluster.local:9092
            - name: DLQ_TOPIC
              value: orders-dlq
            - name: GROUP_ID
              value: orders-dlq-handler
            - name: ENABLE_REPLAY
              value: "false"