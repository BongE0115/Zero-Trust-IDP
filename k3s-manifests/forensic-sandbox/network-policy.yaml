apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-defense-in-depth
  namespace: forensic-sandbox  
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app: forensic-sandbox-app  
  policyTypes:
  - Egress  
  egress: 
  # Kafka 통신 허용 (샌드박스 앱이 Kafka로 나가는 것을 허용) 
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kafka
      podSelector:
        matchLabels:
          strimzi.io/cluster: my-cluster
    ports:
    - protocol: TCP  
      port: 9092  
      
  # 내부 임시 MongoDB (샌드박스 DB 접근 허용)
  - to:
    - podSelector:
        matchLabels:
          app: mongodb-temp  
    ports:
    - protocol: TCP  
      port: 27017  
      
  # K8s DNS 통신 허용
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system  
      podSelector:
        matchLabels:
          k8s-app: kube-dns  
    ports:
    - protocol: UDP  
      port: 53  
  
