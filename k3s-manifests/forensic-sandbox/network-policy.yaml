apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-defense-in-depth
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app: forensic-sandbox-app # 샌드박스 앱과 테스트용 netshoot에 적용
  policyTypes:
  - Egress
  egress:
  # 1. K8s DNS 통신 허용
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  
  # 2. Istio Waypoint 로그 수집을 위해 DB 포트 임시 허용 (1차 방어선 통과)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 5432 # Postgres
    - protocol: TCP
      port: 3306 # MySQL
      
  # 3. Kafka 및 기존 허용 통신 (필요시 아래에 추가)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kafka
    ports:
    - protocol: TCP
      port: 9092