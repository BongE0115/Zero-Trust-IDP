apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dlq-handler-role
  namespace: forensic-sandbox
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dlq-handler-rb
  namespace: forensic-sandbox
subjects:
  - kind: ServiceAccount
    name: dlq-handler-sa
    namespace: kafka-poc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dlq-handler-role