# 1. 앰비언트 메시 라벨이 적용된 네임스페이스 (★ 누락됐던 핵심 부분 복구!)
apiVersion: v1
kind: Namespace
metadata:
  name: forensic-sandbox
  labels:
    # 파드 트래픽을 노드의 ztunnel이 가로채도록 설정
    istio.io/dataplane-mode: ambient
    # 깃옵스 기반 온-디멘드 샌드박스 완전 구현을 위해 샌드박스 생성 및 istio 보안 규칙 순서 동기화 wave 추가
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

---
# 2. 전용 Service Account 생성 (신분증)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-app-sa
  namespace: forensic-sandbox
  # 깃옵스 기반 온-디멘드 샌드박스 완전 구현을 위해 샌드박스 생성 및 istio 보안 규칙 순서 동기화 wave 추가
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

---
# 3. 샌드박스 앱 디플로이먼트
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forensic-sandbox-app
  namespace: forensic-sandbox
   # 깃옵스 기반 온-디멘드 샌드박스 완전 구현을 위해 샌드박스 생성 및 istio 보안 규칙 순서 동기화 wave 추가
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 0 # (평소엔 0, 에러 발생 시 자동화 스크립트가 늘림)
  selector:
    matchLabels:
      app: forensic-sandbox-app
  template:
    metadata:
      labels:
        app: forensic-sandbox-app
    spec:
      # 앱에 전용 신분증 장착
      serviceAccountName: sandbox-app-sa 
      
      # 파드 레벨 보안 설정 (root 실행 금지)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000

      containers:
      - name: consumer-app
        image: alpine:latest # 가벼운 리눅스 이미지 -> 추후 진짜 컨슈머 앱으로 수정해야 됨. 
        command: ["/bin/sh", "-c", "sleep infinity"] # alpine 파드가 즉시 종료되지 않도록 유지하는 명령어
        
        # 컨테이너 레벨 보안 설정 (권한 상승 불가, 읽기 전용 폴더)
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            
        # 리소스 제한 (노드 다운 방지)
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
            
        env:
        - name: KAFKA_TOPIC
          value: "dlq-topic" 
        - name: DB_HOST
          value: "mongodb-temp.forensic-sandbox.svc.cluster.local"