# 1. 앰비언트 메시 라벨이 적용된 네임스페이스
apiVersion: v1
kind: Namespace
metadata:
  name: forensic-sandbox
  labels:
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: sandbox-waypoint
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

---
# 2. 전용 Service Account 생성
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-app-sa
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

---
# 3. 샌드박스 앱 디플로이먼트
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forensic-sandbox-app
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # 💡 [수정 1] 테스트를 위해 레플리카를 1로 변경 (0이면 파드가 안 뜹니다)
  replicas: 1 
  selector:
    matchLabels:
      app: forensic-sandbox-app
  template:
    metadata:
      labels:
        app: forensic-sandbox-app
    spec:
      serviceAccountName: sandbox-app-sa 
      
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000

      containers:
      - name: consumer-app
        # 💡 [수정 2] alpine 대신 nicolaka/netshoot 사용 추천 
        # (alpine은 curl이나 telnet이 기본으로 없어서 테스트가 불편합니다)
        image: nicolaka/netshoot
        command: ["/bin/sh", "-c", "sleep infinity"] 
        
        securityContext:
          # netshoot 이미지를 쓰더라도 아래 보안 설정은 유지해도 무방합니다
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false # 테스트 도중 도구 설치 등을 위해 잠시 false 추천
          capabilities:
            drop:
            - ALL
            
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
            
        env:
        - name: KAFKA_TOPIC
          value: "dlq-topic" 
        - name: DB_HOST
          value: "mongodb-temp.forensic-sandbox.svc.cluster.local"

---
# 💡 [수정 3] RDS 도메인 길잡이 추가
# 이 설정이 이 파일에 있어야 'aws-rds-host'라는 이름으로 curl을 날릴 수 있습니다.
apiVersion: v1
kind: Service
metadata:
  name: aws-rds-host
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: ExternalName
  externalName: aiops-postgres-db.cz4qe6c6ibrd.ap-northeast-2.rds.amazonaws.com