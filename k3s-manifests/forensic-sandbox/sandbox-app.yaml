# 1. 앰비언트 메시 라벨이 적용된 네임스페이스 (★ 누락됐던 핵심 부분 복구!)
apiVersion: v1
kind: Namespace
metadata:
  name: forensic-sandbox
  labels:
    # 파드 트래픽을 노드의 ztunnel이 가로채도록 설정
    istio.io/dataplane-mode: ambient

---
# 2. 전용 Service Account 생성 (신분증)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-app-sa
  namespace: forensic-sandbox

---
# 3. 샌드박스 앱 디플로이먼트
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forensic-sandbox-app
  namespace: forensic-sandbox
spec:
  replicas: 0 # (평소엔 0, 에러 발생 시 자동화 스크립트가 늘림)
  selector:
    matchLabels:
      app: forensic-sandbox-app
  template:
    metadata:
      labels:
        app: forensic-sandbox-app
    spec:
      # 앱에 전용 신분증 장착
      serviceAccountName: sandbox-app-sa 
      
      # 파드 레벨 보안 설정 (root 실행 금지)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000

      containers:
      - name: consumer-app
        image: your-dockerhub-id/consumer-app:latest 
        
        # 컨테이너 레벨 보안 설정 (권한 상승 불가, 읽기 전용 폴더)
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            
        # 리소스 제한 (노드 다운 방지)
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
            
        env:
        - name: KAFKA_TOPIC
          value: "dlq-topic" 
        - name: DB_HOST
          value: "mongodb-temp.forensic-sandbox.svc.cluster.local"