# Istio에게 "저 멀리 외부에 AWS RDS가 있다"고 알려주는 ServiceEntry
apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: aws-rds-external
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  hosts:
  - "aws-rds-host" # AWS RDS 엔드포인트
  ports:
  - number: 5432
    name: tcp-postgres
    protocol: TCP
  location: MESH_EXTERNAL
  resolution: DNS

---
# 샌드박스 앱이 AWS RDS로 나가는 것을 '무조건 거부(DENY)'하는 AuthorizationPolicy
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-aws-rds-egress
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    matchLabels:
      app: forensic-sandbox-app
  action: DENY 
  rules:
  - to:
    - operation:
        hosts: ["aws-rds-host"]  
        ports: ["5432"] 