# [1] Istio에 외부 DB 정보 등록 (Postgres & MySQL 대비)
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: rds-egress-entry
  namespace: forensic-sandbox
spec:
  hosts:
  - "aws-rds-host"
  location: MESH_EXTERNAL
  ports:
  - number: 5432
    name: tcp-postgres
    protocol: TCP
  - number: 3306
    name: tcp-mysql
    protocol: TCP
  resolution: DNS

---
# [2] Waypoint 검문소에서 실제로 트래픽을 거부(DENY)하고 로그를 남김
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-aws-rds-egress
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  targetRefs:
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: sandbox-waypoint
  action: DENY # <--- 이 설정이 로그에 'DENY'를 남깁니다.
  rules:
  - to:
    - operation:
        ports: ["5432", "3306"]        