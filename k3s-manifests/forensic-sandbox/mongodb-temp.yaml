# MongoDB Deployment for Forensic Sandbox
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-temp
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 0 
  selector:
    matchLabels:
      app: mongodb-temp
  template:
    metadata:
      labels:
        app: mongodb-temp
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0 
        securityContext:
          runAsNonRoot: true
          runAsUser: 999             # (통상적인 MongoDB 일반 유저 ID)
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 27017
        
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

---
# MongoDB Service for Forensic Sandbox
apiVersion: v1
kind: Service
metadata:
  name: mongodb-temp
  namespace: forensic-sandbox
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: mongodb-temp
  ports:
  - port: 27017
    targetPort: 27017