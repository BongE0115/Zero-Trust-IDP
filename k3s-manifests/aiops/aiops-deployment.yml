apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-analyzer
  template:
    metadata:
      labels:
        app: aiops-analyzer
    spec:
      containers:
        - name: analyzer
          image: haseok2/error-recovery:latest
          command: ["python", "-m", "app.aiops_runner"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: MONGO_URI
              value: "mongodb://mongodb-service:27017"
            - name: MONGO_DB
              value: "sandbox_db"
            - name: MONGO_COLLECTION
              value: "cases"
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-secrets
                  key: SLACK_BOT_TOKEN
            - name: SLACK_CHANNEL
              value: "#새-채널"
            - name: RESET_DB_ON_START
              value: "false"