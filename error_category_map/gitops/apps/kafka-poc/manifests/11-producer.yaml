apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-api
  namespace: kafka-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer-api
  template:
    metadata:
      labels:
        app: producer-api
    spec:
      # --- [수정 및 추가된 부분] ---
      imagePullSecrets:
        - name: ghcr-secret
      # ---------------------------
      containers:
        - name: producer-api
          image: ghcr.io/haseolc/producer-api:latest
          imagePullPolicy: Always 
          env:
            - name: KAFKA_BOOTSTRAP
              value: kafka.kafka-poc.svc.cluster.local:9092
            - name: KAFKA_TOPIC
              value: orders
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: producer-api
  namespace: kafka-poc
spec:
  type: LoadBalancer # 외부에서 프로듀서 api에 접속하기 위해 로드 밸런스 생성
  selector:
    app: producer-api
  ports:
    - port: 8000
      targetPort: 8000