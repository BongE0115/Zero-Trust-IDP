# waypoint.yaml: forensic-sandbox 네임스페이스의 L7 트래픽 제어를 담당할 Waypoint 프록시 배포
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: sandbox-waypoint
  namespace: forensic-sandbox
  labels:
    istio.io/waypoint-for: service
  annotations:
    # ★ [추가] 2순위: 앱 통신을 검사할 검문소를 앱 배포보다 먼저 건설합니다.
    argocd.argoproj.io/sync-wave: "0"
spec:
  gatewayClassName: istio-waypoint
  listeners:
  - name: mesh
    port: 15008
    protocol: HBONE