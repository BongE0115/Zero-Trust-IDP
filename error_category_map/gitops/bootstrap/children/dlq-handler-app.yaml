apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dlq-handler-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/BongE0115/Zero-Trust-IDP.git'
    targetRevision: hs
    path: error_category_map/gitops/apps/dlq-handler/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kafka-poc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
